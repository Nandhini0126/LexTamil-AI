services:
  # Backend Web Service
  - type: web
    name: lextamil-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false

  # Frontend Static Site (Web Service with static runtime)
  - type: web
    name: lextamil-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    routes:
      # SPA routing fallback: rewrite all other routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
