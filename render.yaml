services:
  # Backend Web Service
  - type: web
    name: lextamil-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: lextamil-ai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Route all /api/* calls to the backend web service
      - type: rewrite
        source: /api/*
        destination: https://lextamil-ai-backend.onrender.com/api/*
      # SPA routing fallback: rewrite all other routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
