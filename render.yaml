services:
  # Backend Web Service (Free Tier)
  - type: web
    name: lextamil-ai-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 1

  # Frontend Static Site (Free)
  - type: web
    name: lextamil-ai-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://lextamil-ai-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
